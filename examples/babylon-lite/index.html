<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" type="text/css" media="screen,print" href="style.css" />
<title>[WebGPU] Babylon Lite + glTFLoader</title>

<!-- @babylonjs/lite v1.5.0 (loaded via importmap) -->
<script type="importmap">
{
  "imports": {
    "babylon-lite": "https://esm.sh/@babylonjs/lite@1.5.0",
    "@babylonjs/havok": "https://esm.sh/@babylonjs/havok@1.3.12/lib/esm/HavokPhysics_es.js"
  }
}
</script>
<script src="../../sampleModels/model-index.js"></script>
<script src="../../tutorialModels/model-index.js"></script>
<script src="../../tutorialModels/pbr-model-index.js"></script>
<script src="../../tutorialModels/further-pbr-model-index.js"></script>
<script src="../../tutorialModels/feature-test-model-index.js"></script>
<script src="../../tutorialModels/compare-pbr-model-index.js"></script>
<script src="../../tutorialModels/extension-test-model-index.js"></script>
<script src="../../tutorialModels/wip-extension-test-model-index.js"></script>
</head>
<body>

<!-- dat.gui.js -->
<script src="../../libs/common/dat.gui.js"></script>

<!-- Draco decoder for KHR_draco_mesh_compression support.
     Lite checks globalThis.DracoDecoderModule first; if present, uses it directly
     instead of fetching from the (nonexistent) site root. The wrapper overrides
     locateFile so the WASM is resolved from the same libs directory. -->
<script src="../../libs/babylonjs/9.4.1/draco_decoder.js"></script>
<script>
(function() {
    var orig = window.DracoDecoderModule;
    if (typeof orig !== 'function') return;
    var base = new URL("../../libs/babylonjs/9.4.1/", document.baseURI).href;
    window.DracoDecoderModule = function(cfg) {
        return orig(Object.assign({}, cfg, {
            locateFile: function(f) { return base + f; }
        }));
    };
})();
</script>

<!-- meshopt decoder for EXT_meshopt_compression support.
     Lite checks globalThis.MeshoptDecoder first; if present, uses it directly
     instead of fetching from the (nonexistent) site root. The WASM is inlined
     in this file, so no locateFile override is needed. -->
<script src="../../libs/babylonjs/9.4.1/meshopt_decoder.js"></script>

<canvas id="renderCanvas"></canvas>
<div id="dropZone" class="drop-zone hidden">
  <div class="drop-zone__panel">
    <div class="drop-zone__title">Drop glTF Model</div>
    <div id="dropZoneMessage" class="drop-zone__message">Drag &amp; drop a .glb or .gltf model here, or click to choose files.</div>
  </div>
</div>
<input id="fileInput" type="file" accept=".glb,.gltf,.bin,image/*" multiple hidden />

<script type="module" src="index.js"></script>
</body>
</html>
